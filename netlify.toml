[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API routes for Tavus functions
[[redirects]]
  from = "/api/tavus"
  to = "/.netlify/functions/tavus"
  status = 200

[[redirects]]
  from = "/api/video-status"
  to = "/.netlify/functions/video-status"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"